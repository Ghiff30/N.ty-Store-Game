<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Up Mobile Legends | N.ty</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #0b132b, #1c2541); color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: rgba(28, 37, 65, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(56, 189, 248, 0.2); padding: 40px; border-radius: 20px; width: 100%; max-width: 480px; text-align: center; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); }
        h1 { font-size: 24px; margin-bottom: 5px; background: linear-gradient(45deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub-title { color: #94a3b8; font-size: 14px; margin-bottom: 15px; }
        
        .btn-back-nav { display: inline-block; background: rgba(251, 191, 36, 0.1); color: #fbbf24; padding: 6px 16px; border-radius: 20px; text-decoration: none; font-size: 13px; font-weight: 600; margin-bottom: 25px; border: 1px solid rgba(251, 191, 36, 0.2); transition: 0.3s; }
        .btn-back-nav:hover { background: #fbbf24; color: #0b132b; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(251, 191, 36, 0.3); }
        .btn-back-bottom { margin-top: 15px; margin-bottom: 0; display: inline-block; }

        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 14px; color: #cbd5e1; margin-bottom: 8px; font-weight: 600; }
        /* Kasih ID game-id pada input untuk dibaca JavaScript */
        input { width: 100%; padding: 12px; background: #0b132b; border: 1px solid #3a506b; border-radius: 10px; color: white; font-size: 15px; outline: none; }
        input:focus { border-color: #fbbf24; box-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }
        
        .nominal-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 10px; margin-bottom: 25px; }
        .nominal-item { background: #0b132b; border: 1px solid #3a506b; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.3s ease; }
        .nominal-item:hover { border-color: #fbbf24; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(251, 191, 36, 0.2); }
        .item-title { font-size: 15px; font-weight: bold; color: #f8fafc; margin-bottom: 4px; }
        .item-price { font-size: 13px; color: #fbbf24; }

        .nominal-item.active {
            border-color: #fbbf24 !important;
            background: rgba(251, 191, 36, 0.15) !important;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
            transform: scale(1.03);
        }

        .total-container { background: rgba(11, 19, 43, 0.6); padding: 12px; border-radius: 10px; border: 1px dashed rgba(251, 191, 36, 0.3); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 15px; }
        .total-label { color: #cbd5e1; font-weight: 500; }
        .total-amount { color: #fbbf24; font-weight: bold; font-size: 18px; }

        /* Kasih ID btn-pay agar tombol bisa dikontrol JavaScript */
        .btn-pay { display: block; width: 100%; padding: 14px; background: linear-gradient(45deg, #fbbf24, #f59e0b); color: #0b132b; font-size: 16px; font-weight: bold; border-radius: 12px; text-decoration: none; border: none; cursor: pointer; margin-bottom: 5px; transition: 0.3s; box-shadow: 0 5px 15px rgba(251, 191, 36, 0.3); }
        .btn-pay:hover { transform: scale(1.02); box-shadow: 0 8px 20px rgba(251, 191, 36, 0.5); }
    </style>
</head>
<body>

    <div class="card">
        <h1>⚔️ Mobile Legends</h1>
        <p class="sub-title">Isi Data, Pilih Nominal & Metode Pembayaran</p>
        
        <a href="N.ty.html" class="btn-back-nav">← Kembali ke Menu Utama</a>
        
        <div class="form-group">
            <label>User ID & Zone ID</label>
            <input type="number" id="game-id" placeholder="Contoh: 12345678 (1234)">
        </div>

        <div class="form-group">
            <label>Pilih Nominal Diamond 💎</label>
            <div class="nominal-grid group-diamond">
                <div class="nominal-item"><div class="item-title">86 Diamonds</div><div class="item-price">Rp 20.000</div></div>
                <div class="nominal-item"><div class="item-title">172 Diamonds</div><div class="item-price">Rp 40.000</div></div>
                <div class="nominal-item"><div class="item-title">257 Diamonds</div><div class="item-price">Rp 60.000</div></div>
                <div class="nominal-item"><div class="item-title">706 Diamonds</div><div class="item-price">Rp 150.000</div></div>
            </div>
        </div>

        <div class="form-group">
            <label>Pilih Metode Pembayaran 💳</label>
            <div class="nominal-grid group-payment">
                <div class="nominal-item"><div class="item-title">📸 QRIS</div><div class="item-price">Otomatis</div></div>
                <div class="nominal-item"><div class="item-title">🔷 DANA</div><div class="item-price">E-Wallet</div></div>
                <div class="nominal-item"><div class="item-title">🟢 GoPay</div><div class="item-price">E-Wallet</div></div>
                <div class="nominal-item"><div class="item-title">🏦 Bank Tf</div><div class="item-price">Transfer</div></div>
            </div>
        </div>

        <div class="total-container">
            <span class="total-label">Total Pembayaran:</span>
            <span class="total-amount" id="display-total">Rp 0</span>
        </div>

        <button class="btn-pay" id="btn-pay">💸 Bayar Sekarang</button>
        
        <a href="N.ty.html" class="btn-back-nav btn-back-bottom">← Kembali ke Menu Utama</a>
    </div>

    <script>
        function setupSelection(groupClass, isDiamondGroup = false) {
            const items = document.querySelectorAll(`${groupClass} .nominal-item`);
            items.forEach(item => {
                item.addEventListener('click', () => {
                    items.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');

                    if (isDiamondGroup) {
                        const priceText = item.querySelector('.item-price').innerText;
                        document.getElementById('display-total').innerText = priceText;
                    }
                });
            });
        }

        setupSelection('.group-diamond', true);
        setupSelection('.group-payment', false);

        // 🚨 LOGIKA CEK INPUT VALIDASI SAAT TOMBOL DIKLIK 🚨
        document.getElementById('btn-pay').addEventListener('click', () => {
            const userId = document.getElementById('game-id').value.trim();
            const selectedDiamond = document.querySelector('.group-diamond .nominal-item.active');
            const selectedPayment = document.querySelector('.group-payment .nominal-item.active');

            if (!userId) {
                alert('Eits! User ID & Zone ID kamu belum diisi nih. Tolong diisi dulu ya! 🚨');
                return;
            }
            if (!selectedDiamond) {
                alert('Pilih nominal Diamond yang kamu inginkan dulu yuk! 💎');
                return;
            }
            if (!selectedPayment) {
                alert('Jangan lupa pilih Metode Pembayaran kesukaanmu ya! 💳');
                return;
            }

            // Jika semua sudah diisi dengan benar
            const diamondName = selectedDiamond.querySelector('.item-title').innerText;
            const paymentName = selectedPayment.querySelector('.item-title').innerText;
            alert(`🎉 Berhasil! Pembelian ${diamondName} untuk ID: ${userId} menggunakan ${paymentName} sedang diproses. Terima kasih!`);
        });
    </script>

</body>
</html>
